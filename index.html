<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龍華科大數商尋物站 - 正式連線版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        html, body { max-width: 100vw; overflow-x: hidden; }
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; transition: 0.2s; }
        input[type="date"]::-webkit-calendar-picker-indicator:hover { opacity: 1; }
        .fade-enter { opacity: 0; transform: translateY(10px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: opacity 300ms, transform 300ms; }
        html { scroll-behavior: smooth; }
        *:focus-visible { outline: 2px solid #10b981; outline-offset: 2px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col pb-16 md:pb-0">

    <div id="in-app-warning" class="hidden bg-red-600 text-white px-4 py-3.5 text-sm font-bold shadow-md relative z-50 transition-all">
        <div class="max-w-6xl mx-auto flex items-start gap-3">
            <i class="fa-solid fa-triangle-exclamation text-2xl mt-0.5 animate-pulse text-red-200"></i>
            <div class="flex-grow">
                <span class="block text-base mb-1">⚠️ 登入受限警告 (請在外部開啟)</span>
                您目前正在使用通訊軟體的內部瀏覽器，這將導致無法順利登入。<br>
                請點擊螢幕右上角 (或右下角) 的 <i class="fa-solid fa-ellipsis-vertical mx-1"></i> 選單，選擇 <span class="bg-black/20 px-1.5 py-0.5 rounded inline-block mt-1">在外部瀏覽器開啟 (Safari / Chrome)</span>。
            </div>
        </div>
    </div>

    <header class="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer group" onclick="window.navigate('home')">
                <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white text-lg font-black shadow-md shadow-emerald-200 group-hover:scale-105 transition-transform">L</div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight text-slate-800 flex items-center gap-1">
                        數商尋物站 <span class="text-xs bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-normal">龍華科大</span>
                    </h1>
                    <p class="text-xs text-slate-500 font-medium hidden sm:block">數位行銷系 專屬失物招領平台</p>
                </div>
            </div>
            <div id="auth-container"></div>
        </div>
        <div class="border-t border-slate-100 bg-slate-50/50">
            <div class="max-w-6xl mx-auto px-4" id="nav-container"></div>
        </div>
    </header>

    <main id="main-content" class="flex-grow bg-slate-50 min-h-[calc(100vh-150px)]"></main>

    <div id="system-toast" class="fixed bottom-4 right-4 px-6 py-3 rounded-xl shadow-lg transition-all duration-300 transform translate-y-10 opacity-0 pointer-events-none z-50"></div>

    <button id="back-to-top" aria-label="回到網頁頂部" onclick="window.scrollTo({top:0, behavior:'smooth'})" class="fixed bottom-6 right-4 w-12 h-12 bg-slate-800 text-white rounded-full shadow-xl flex items-center justify-center transition-all duration-300 opacity-0 pointer-events-none z-40 hover:bg-slate-700 hover:scale-105 focus:ring-2 focus:ring-slate-400 outline-none">
        <i class="fa-solid fa-arrow-up text-lg"></i>
    </button>

    <dialog id="confirm-dialog" class="bg-white rounded-2xl shadow-2xl border-0 p-0 backdrop:bg-slate-900/50 backdrop:backdrop-blur-sm max-w-sm w-[90%] md:w-full m-auto open:animate-[fade-in_0.2s_ease-out]">
        <div class="p-6">
            <div class="flex items-center gap-3 mb-4">
                <div id="dialog-icon-bg" class="w-10 h-10 rounded-full flex items-center justify-center shrink-0">
                    <i id="dialog-icon" class="fa-solid text-xl"></i>
                </div>
                <h3 id="dialog-title" class="text-xl font-bold text-slate-800">確認操作</h3>
            </div>
            <p id="dialog-message" class="text-slate-600 text-sm leading-relaxed mb-6 whitespace-pre-wrap"></p>
            <div class="flex gap-3 justify-end">
                <button id="dialog-cancel-btn" autofocus class="px-5 py-2.5 rounded-lg font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition focus:ring-2 focus:ring-slate-300 outline-none">取消</button>
                <button id="dialog-confirm-btn" class="px-5 py-2.5 rounded-lg font-bold text-white transition shadow-sm focus:ring-2 focus:outline-none">確認</button>
            </div>
        </div>
    </dialog>

    <script type="module">
        // 🔥 載入 Firebase 官方套件
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // 🔥 使用您提供的金鑰
        const firebaseConfig = {
            apiKey: "AIzaSyBtmjplYHKk1ktkYPuJcs-xqKFdNjjpjfs",
            authDomain: "k12-lhu-dmcb-lostfound.firebaseapp.com",
            projectId: "k12-lhu-dmcb-lostfound",
            storageBucket: "k12-lhu-dmcb-lostfound.firebasestorage.app",
            messagingSenderId: "990329211600",
            appId: "1:990329211600:web:2fda953d4c4f875ce7acd5",
            measurementId: "G-CTFCTNHQSC"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        // 👑 系統管理員權限名單 (已為您正確寫入)
        const ADMIN_EMAILS = [
            'mindnodeai@gmail.com', 
            'ishareping@gmail.com'
        ];

        window.state = {
            isInitialLoading: true, isLoadingError: false,  
            user: null, activeRole: 'student', currentView: 'home', selectedItemId: null,
            filters: { keyword: '', category: '', status: '' },
            foundItems: [], lostItems: []
        };

        // 監聽使用者登入狀態 (Realtime)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.state.user = { uid: user.uid, email: user.email, displayName: user.displayName, photoURL: user.photoURL };
                // 判斷是否為管理員
                if (ADMIN_EMAILS.includes(user.email)) {
                    window.state.activeRole = 'admin';
                } else {
                    window.state.activeRole = 'student';
                }
            } else {
                window.state.user = null;
                window.state.activeRole = 'student';
            }
            window.render();
        });

        window.lockButton = function(btn) {
            if (!btn) return null;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 處理中...';
            btn.disabled = true;
            btn.classList.add('opacity-70', 'cursor-not-allowed');
            return originalText;
        };

        window.unlockButton = function(btn, originalText) {
            if (!btn || !originalText) return;
            btn.innerHTML = originalText;
            btn.disabled = false;
            btn.classList.remove('opacity-70', 'cursor-not-allowed');
        };

        window.navigate = function(view, id = null) {
            window.state.currentView = view;
            window.state.selectedItemId = id;
            window.render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.showToast = function(message, type = 'success') {
            const toastEl = document.getElementById('system-toast');
            const isError = type === 'error';
            toastEl.className = `fixed bottom-4 right-4 px-6 py-3 rounded-xl shadow-lg text-white font-bold transition-all duration-300 transform translate-y-0 opacity-100 z-50 flex items-center gap-2 ${isError ? 'bg-red-600' : 'bg-emerald-600'}`;
            toastEl.setAttribute('role', isError ? 'alert' : 'status');
            toastEl.innerHTML = isError ? `<i class="fa-solid fa-circle-exclamation"></i> <span>${message}</span>` : `<i class="fa-solid fa-circle-check"></i> <span>${message}</span>`;
            setTimeout(() => { toastEl.className = "fixed bottom-4 right-4 px-6 py-3 rounded-xl transition-all duration-300 transform translate-y-10 opacity-0 pointer-events-none z-50"; }, 3000);
        };

        window.showConfirmDialog = function(title, message, confirmText, isDanger, onConfirm) {
            const dialog = document.getElementById('confirm-dialog');
            document.getElementById('dialog-title').innerText = title;
            document.getElementById('dialog-message').innerText = message;
            
            const confirmBtn = document.getElementById('dialog-confirm-btn');
            confirmBtn.innerText = confirmText;
            
            const iconBg = document.getElementById('dialog-icon-bg');
            const icon = document.getElementById('dialog-icon');
            
            if (isDanger) {
                confirmBtn.className = "px-5 py-2.5 rounded-lg font-bold text-white transition shadow-sm focus:ring-2 focus:outline-none bg-red-600 hover:bg-red-700 focus:ring-red-200";
                iconBg.className = "w-10 h-10 rounded-full flex items-center justify-center shrink-0 bg-red-100 text-red-600";
                icon.className = "fa-solid fa-triangle-exclamation text-xl";
            } else {
                confirmBtn.className = "px-5 py-2.5 rounded-lg font-bold text-white transition shadow-sm focus:ring-2 focus:outline-none bg-emerald-600 hover:bg-emerald-700 focus:ring-emerald-200";
                iconBg.className = "w-10 h-10 rounded-full flex items-center justify-center shrink-0 bg-emerald-100 text-emerald-600";
                icon.className = "fa-solid fa-circle-question text-xl";
            }
            
            const cancelBtn = document.getElementById('dialog-cancel-btn');
            const newConfirmBtn = confirmBtn.cloneNode(true);
            confirmBtn.parentNode.replaceChild(newConfirmBtn, confirmBtn);
            const newCancelBtn = cancelBtn.cloneNode(true);
            cancelBtn.parentNode.replaceChild(newCancelBtn, cancelBtn);
            
            newCancelBtn.onclick = () => dialog.close();
            newConfirmBtn.onclick = () => { dialog.close(); onConfirm(); };
            
            dialog.showModal();
            newCancelBtn.focus();
        };

        // ☁️ 連接真實資料庫 (即時監聽)
        window.loadDataFromCloud = function() {
            window.state.isInitialLoading = true;
            window.render();
            
            try {
                // 監聽拾獲物 (Found Items)
                onSnapshot(collection(db, "foundItems"), (snapshot) => {
                    const items = [];
                    snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
                    window.state.foundItems = items.filter(item => item.status !== '已刪除').sort((a, b) => b.createdAt - a.createdAt);
                    window.state.isInitialLoading = false;
                    window.render();
                }, (error) => {
                    console.error("Firebase 讀取錯誤 (Found):", error);
                    window.state.isLoadingError = true;
                    window.state.isInitialLoading = false;
                    window.render();
                });

                // 監聽遺失協尋 (Lost Items)
                onSnapshot(collection(db, "lostItems"), (snapshot) => {
                    const items = [];
                    snapshot.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
                    window.state.lostItems = items.filter(item => item.status !== '已刪除').sort((a, b) => b.createdAt - a.createdAt);
                    window.render();
                }, (error) => {
                    console.error("Firebase 讀取錯誤 (Lost):", error);
                });

            } catch (error) {
                console.error("連線錯誤:", error);
                window.state.isInitialLoading = false;
                window.state.isLoadingError = true;
                window.render();
            }
        };

        // 🔐 真實 Google 登入
        window.loginWithGoogle = async function() {
            try {
                await signInWithPopup(auth, provider);
                window.showToast('✅ 登入成功');
            } catch (error) {
                console.error(error);
                window.showToast('登入失敗，請重試', 'error');
            }
        };

        window.logout = async function() {
            try {
                await signOut(auth);
                window.showToast("👋 已成功登出");
                window.navigate('home');
            } catch (error) {
                console.error(error);
            }
        };

        // 🛡️ 軟刪除與資料庫更新邏輯
        window.deleteItem = function(event, id, title) {
            if (window.state.activeRole !== 'admin') return;
            const btn = event ? event.currentTarget : null;
            
            window.showConfirmDialog('刪除拾獲物', `確定要刪除「${title}」嗎？\n此物品將從前台隱藏（軟刪除），以備系辦日後查驗。`, '確認刪除', true, async () => {
                const originalText = window.lockButton(btn);
                try {
                    await updateDoc(doc(db, "foundItems", id), { status: '已刪除', deletedAt: Date.now() });
                    window.showToast('🗑️ 失物已封存並從列表隱藏');
                    window.navigate('home');
                } catch(e) { window.showToast('刪除失敗', 'error'); window.unlockButton(btn, originalText); }
            });
        };

        window.markItemClosed = function(event, id, title) {
            if (window.state.activeRole !== 'admin') return;
            const btn = event ? event.currentTarget : null;

            window.showConfirmDialog('歸檔結案', `確認「${title}」已經交付失主，並要將狀態改為已結案嗎？\n結案後，案件將移入歷史紀錄。`, '確認結案', false, async () => {
                const originalText = window.lockButton(btn);
                try {
                    await updateDoc(doc(db, "foundItems", id), { status: "已結案", closedAt: Date.now() });
                    window.showToast('📦 物品已成功交付並歸檔結案！');
                    window.navigate('home');
                } catch(e) { window.showToast('結案失敗', 'error'); window.unlockButton(btn, originalText); }
            });
        };

        window.deleteLostItem = function(event, id, title) {
            if (window.state.activeRole !== 'admin') return;
            const btn = event ? event.currentTarget : null;

            window.showConfirmDialog('刪除協尋文', `確定要刪除「${title}」的協尋文章嗎？\n此動作不可逆。`, '確認刪除', true, async () => {
                const originalText = window.lockButton(btn);
                try {
                    await updateDoc(doc(db, "lostItems", id), { status: '已刪除', deletedAt: Date.now() });
                    window.showToast('🗑️ 協尋文章已刪除');
                } catch(e) { window.showToast('刪除失敗', 'error'); window.unlockButton(btn, originalText); }
            });
        };

        // 📤 真實新增與圖片上傳邏輯
        window.submitNewItem = async function(event) {
            event.preventDefault();
            const btn = document.getElementById('submit-btn');
            const originalText = window.lockButton(btn);
            
            const formData = new FormData(event.target);
            const fileInput = document.getElementById('item-image');
            
            if (fileInput.files.length > 0 && fileInput.files[0].size > 5 * 1024 * 1024) {
                window.showToast("圖片檔案過大 (超過 5MB)", "error");
                window.unlockButton(btn, originalText);
                return;
            }

            try {
                let imageUrl = "https://placehold.co/500x300/e2e8f0/475569?text=No+Image";
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const storageRef = ref(storage, 'foundItems/' + Date.now() + '_' + file.name);
                    await uploadBytes(storageRef, file);
                    imageUrl = await getDownloadURL(storageRef);
                }

                let finalCategory = formData.get('categorySelect');
                if (finalCategory === '其他') finalCategory = formData.get('customCategory') || '未分類';

                await addDoc(collection(db, "foundItems"), {
                    title: formData.get('title'), 
                    category: finalCategory, 
                    location: formData.get('location'), 
                    date: formData.get('date'), 
                    description: formData.get('description'), 
                    hiddenFeature: formData.get('hiddenFeature'),
                    status: "待認領", 
                    image: imageUrl, 
                    claimRequests: [],
                    createdAt: Date.now()
                });

                window.showToast('✅ 成功寫入資料庫！');
                window.navigate('home');
            } catch(e) {
                console.error(e);
                window.showToast('寫入失敗，請檢查權限', 'error');
                window.unlockButton(btn, originalText);
            }
        };

        window.submitNewLostItem = async function(event) {
            event.preventDefault();
            const btn = document.getElementById('submit-lost-btn');
            const originalText = window.lockButton(btn);
            const formData = new FormData(event.target);
            try {
                await addDoc(collection(db, "lostItems"), {
                    title: formData.get('title'),
                    location: formData.get('location'),
                    date: formData.get('date'),
                    description: formData.get('description'),
                    studentName: window.state.user.displayName,
                    contact: formData.get('contact'),
                    userId: window.state.user.uid,
                    status: '協尋中',
                    createdAt: Date.now()
                });
                window.showToast('📢 協尋發布成功！', 'success');
                window.navigate('lost_list');
            } catch(e) {
                window.showToast('發布失敗', 'error');
                window.unlockButton(btn, originalText);
            }
        };

        window.submitEditItem = async function(event) {
            event.preventDefault();
            const btn = document.getElementById('submit-edit-btn');
            const originalText = window.lockButton(btn);
            
            const formData = new FormData(event.target);
            const fileInput = document.getElementById('item-image-edit');
            const itemId = window.state.selectedItemId;
            const currentItem = window.state.foundItems.find(i => i.id === itemId);

            try {
                let imageUrl = currentItem.image; // 預設保留舊圖片
                if (fileInput.files.length > 0) {
                    if (fileInput.files[0].size > 5 * 1024 * 1024) {
                        window.showToast("圖片檔案過大 (超過 5MB)", "error");
                        window.unlockButton(btn, originalText);
                        return;
                    }
                    const file = fileInput.files[0];
                    const storageRef = ref(storage, 'foundItems/' + Date.now() + '_' + file.name);
                    await uploadBytes(storageRef, file);
                    imageUrl = await getDownloadURL(storageRef);
                }

                let finalCategory = formData.get('categorySelect');
                if (finalCategory === '其他') finalCategory = formData.get('customCategory') || '未分類';

                await updateDoc(doc(db, "foundItems", itemId), {
                    title: formData.get('title'), 
                    category: finalCategory, 
                    location: formData.get('location'), 
                    date: formData.get('date'), 
                    description: formData.get('description'), 
                    hiddenFeature: formData.get('hiddenFeature'),
                    image: imageUrl
                });

                window.showToast('✅ 資料更新成功！');
                window.navigate('item_detail', itemId);
            } catch(e) {
                console.error(e);
                window.showToast('更新失敗，請檢查權限', 'error');
                window.unlockButton(btn, originalText);
            }
        };

        window.handleClaimAction = async function(event, itemId, param3 = null, param4 = null) {
            if (event && event.type === 'submit') event.preventDefault();
            const item = window.state.foundItems.find(i => i.id === itemId);
            if (!item) return;

            let action = 'submit'; let reqId = null;
            if (param4) { reqId = param3; action = param4; } 
            else if (param3) { action = param3; }

            let btn = null;
            if (event && event.type === 'submit') btn = event.target.querySelector('button[type="submit"]');
            else if (event && event.currentTarget) btn = event.currentTarget;

            const processAction = async () => {
                const originalText = window.lockButton(btn);
                try {
                    const itemRef = doc(db, "foundItems", itemId);
                    
                    if (action === 'submit') {
                        const newReq = { 
                            requestId: 'REQ-'+Date.now(), 
                            studentName: window.state.user.displayName, 
                            contact: new FormData(event.target).get('contact'), 
                            answer: new FormData(event.target).get('answer'), 
                            status: '待審核',
                            userId: window.state.user.uid
                        };
                        const updatedRequests = item.claimRequests ? [...item.claimRequests, newReq] : [newReq];
                        await updateDoc(itemRef, { status: "審核中", claimRequests: updatedRequests });
                        window.showToast('✅ 申請已送出！請靜候系辦通知。');
                        window.navigate('home');
                    } else if (action === 'approve') {
                        const updatedRequests = item.claimRequests.map(r => r.requestId === reqId ? {...r, status: '已核准'} : r);
                        await updateDoc(itemRef, { status: "待領取", claimRequests: updatedRequests });
                        window.showToast('✅ 已核准！狀態更新為「待領取」');
                    } else if (action === 'reject') {
                        const updatedRequests = item.claimRequests.map(r => r.requestId === reqId ? {...r, status: '已駁回'} : r);
                        const pendingCount = updatedRequests.filter(r => r.status === '待審核').length;
                        const newStatus = pendingCount === 0 ? "待認領" : item.status;
                        await updateDoc(itemRef, { status: newStatus, claimRequests: updatedRequests });
                        window.showToast('❌ 已駁回申請');
                    }
                } catch(e) { window.showToast('操作失敗', 'error'); window.unlockButton(btn, originalText); }
            };

            if (action === 'reject') {
                const req = item.claimRequests.find(r => r.requestId === reqId);
                window.showConfirmDialog('駁回申請', `確定要駁回 ${req ? req.studentName : '該學生'} 的領取申請嗎？\n該筆申請將被作廢。`, '確認駁回', true, processAction);
            } else {
                processAction();
            }
        };

        window.markLostItemFound = async function(event, id) {
            const btn = event ? event.currentTarget : null;
            const originalText = window.lockButton(btn);
            try {
                await updateDoc(doc(db, "lostItems", id), { status: "已尋獲" });
                window.showToast('🎉 太棒了！物品已結案！');
            } catch(e) { window.showToast('操作失敗', 'error'); window.unlockButton(btn, originalText); }
        };

        window.requestSecondHand = async function(event, itemId) {
            event.stopPropagation(); 
            if (!window.state.user) { window.showToast('請先登入才能申請索取喔！', 'error'); return; }
            const btn = event.currentTarget;
            const originalText = window.lockButton(btn);
            try {

                auth.innerHTML = `<div class="flex items-center gap-3 fade-enter-active"><div class="text-right hidden sm:block"><div class="text-sm font-bold text-slate-700">${window.state.user.displayName}</div></div><img src="${window.state.user.photoURL}" class="w-9 h-9 rounded-full border-2 border-emerald-100 shadow-sm"><button onclick="window.logout()" aria-label="登出" class="text-slate-400 hover:text-red-500 bg-slate-100 hover:bg-red-50 w-9 h-9 flex items-center justify-center rounded-full transition"><i class="fa-solid fa-right-from-bracket"></i></button></div>`;
            } else {
                auth.innerHTML = `<button onclick="window.loginWithGoogle()" class="bg-white border border-slate-200 text-slate-700 font-bold py-2 px-5 rounded-lg shadow-sm text-sm hover:bg-slate-50 transition flex items-center gap-2"><i class="fab fa-google text-slate-400"></i><span class="hidden sm:inline">登入</span></button>`;
            }
            document.getElementById('nav-container').innerHTML = renderNavigation();

            if (window.state.isInitialLoading) {
                main.innerHTML = `<div class="max-w-6xl mx-auto px-4 py-8 animate-pulse"><div class="h-8 bg-slate-200 rounded w-48 mb-6"></div><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"><div class="bg-white rounded-xl border border-slate-100 shadow-sm h-72"></div><div class="bg-white rounded-xl border border-slate-100 shadow-sm h-72 hidden md:block"></div></div></div>`;
            } else if (window.state.isLoadingError) {
                main.innerHTML = `<div class="py-24 text-center"><i class="fa-solid fa-wifi text-6xl text-slate-300 mb-4"></i><h3 class="text-xl font-bold text-slate-700 mb-2">資料連線失敗</h3><button onclick="window.loadDataFromCloud()" class="bg-slate-800 hover:bg-slate-900 transition text-white font-bold py-2.5 px-6 rounded-lg mt-4">重新連線</button></div>`;
            } else {
                const views = { 'home': renderFoundList, 'add_item': renderAddItem, 'item_detail': renderItemDetail, 'admin_dashboard': renderAdminDashboard, 'lost_list': renderLostList, 'add_lost': renderAddLostItem, 'second_hand': renderSecondHandList, 'edit_item': renderEditItem };
                main.innerHTML = (views[window.state.currentView] || renderFoundList)();
            }

            if (activeId) {
                const restoredEl = document.getElementById(activeId);
                if (restoredEl) {
                    restoredEl.focus();
                    if (selectionStart !== null) { try { restoredEl.setSelectionRange(selectionStart, selectionEnd); } catch(e) {} }
                }
            }
        };

        window.onload = function() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            if (ua.indexOf('Line') > -1 || ua.indexOf('FBAV') > -1 || ua.indexOf('Instagram') > -1) {
                const warningBanner = document.getElementById('in-app-warning');
                if(warningBanner) warningBanner.classList.remove('hidden');
            }
            window.render();
            window.loadDataFromCloud(); // 啟動 Firebase 監聽
            
            window.addEventListener('scroll', () => {
                const fab = document.getElementById('back-to-top');
                if (!fab) return;
                if (window.scrollY > 300) { fab.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4'); fab.classList.add('opacity-100', 'translate-y-0'); } 
                else { fab.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4'); fab.classList.remove('opacity-100', 'translate-y-0'); }
            });
        };
    </script>
</body>
</html>
